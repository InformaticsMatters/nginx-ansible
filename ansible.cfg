[defaults]
inventory = inventory.yaml
retry_files_enabled = False
nocows = 1
# Use a project-local collections path so a stale 'kubernetes.core' in
# the user's '~/.ansible/collections' cannot shadow the version bundled
# (via uv) in the venv. The bundled collection is always discoverable
# through the package finder regardless of this path.
collections_path = ./collections
